spring:
  application:
    name:BengeBackend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/picture?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 1234

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  type-aliases-package: com.bengebackend.model

# JWT配置
jwt:
  secret: yoursecretkey123456789abcdefghijklmnopqrstuvwxyz
  expiration: 86400000 # 24小时(毫秒)

# 服务端口配置
server:
  port: 7122
  address: 0.0.0.0
  tomcat:
    max-swallow-size: -1       # 不限制最大吞咽大小
  servlet:
    context-parameters:
      org.apache.tomcat.websocket.textBufferSize: 1048576  # 1MB
      org.apache.tomcat.websocket.binaryBufferSize: 1048576
logging:
  level:
    com.bengebackend: debug

debug: true

redisson:
  config: |
    singleServerConfig:
      address: "redis://127.0.0.1:6379"

